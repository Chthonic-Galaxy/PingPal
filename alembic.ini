[alembic]
script_location = migrations
prepend_sys_path = .

# URL is set dynamically in migrations/env.py via src.database.build_db_settings()
sqlalchemy.url = postgresql+asyncpg://ignored:ignored@localhost:5432/ignored

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
